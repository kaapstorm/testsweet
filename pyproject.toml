[project]
name = "testsweet"
version = "0.1.0"
description = "Python testing for humans"
readme = "README.md"
requires-python = ">=3.11"
dependencies = []

[dependency-groups]
dev = [
    "mypy",
    "pre-commit",
    "ruff",
]

[tool.ruff]
line-length = 79

[tool.ruff.format]
quote-style = "single"

[tool.mypy]
python_version = "3.11"
files = ["src", "tests"]
mypy_path = "src"
